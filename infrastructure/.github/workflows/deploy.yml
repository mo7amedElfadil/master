  #         scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
  #           docker-compose.prod.yml $USER@$HOST:$DEPLOY_PATH/docker-compose.yml
  #
  #     - name: Write .env file
  #       run: |
  #         echo "${{ secrets.PROD_ENV_FILE }}" > .env.prod
  #         scp -i ~/.ssh/deploy_key .env.prod $USER@$HOST:$DEPLOY_PATH/.env
  #         rm .env.prod
